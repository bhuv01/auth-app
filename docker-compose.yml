version: '3.8'

services:

  db:
    image: postgres:16-alpine
    container_name: auth_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/db.sql:/docker-entrypoint-initdb.d/init.sql  # auto-runs on first start
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: auth_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 3001
      DB_HOST: db          # service name = hostname inside Docker network
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USER: postgres
      DB_PASSWORD: yourpassword
      JWT_SECRET: supersecretkey123
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: auth_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pg_data:
