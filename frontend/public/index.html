<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --card: #141720;
      --border: #1e2330;
      --accent: #4ade80;
      --accent2: #22d3ee;
      --text: #e2e8f0;
      --muted: #64748b;
      --error: #f87171;
    }

    body {
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 20% 50%, #0f1f1a 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, #0a1520 0%, transparent 50%);
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo span {
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-top: 6px;
    }

    .logo h1 em { color: var(--accent2); font-style: normal; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 10px;
      cursor: pointer;
      text-transform: uppercase;
      transition: color 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent2); }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: var(--accent);
      color: #0d0f14;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }

    .msg.error { color: var(--error); }
    .msg.success { color: var(--accent); }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <span>// auth demo</span>
    <h1>NODE<em>AUTH</em></h1>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="login()">Login →</button>
      <div class="msg" id="loginMsg"></div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="regName" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min 6 chars" />
      </div>
      <button class="btn" onclick="register()">Register →</button>
      <div class="msg" id="regMsg"></div>
    </div>
  </div>
</div>

<script>
  const API = '/api';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  }

  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msg = document.getElementById('loginMsg');

    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) { msg.className = 'msg error'; msg.textContent = data.error; return; }

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } catch {
      msg.className = 'msg error'; msg.textContent = 'Cannot connect to server';
    }
  }

  async function register() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const msg = document.getElementById('regMsg');

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (!res.ok) { msg.className = 'msg error'; msg.textContent = data.error; return; }
      msg.className = 'msg success'; msg.textContent = '✓ Registered! You can now login.';
    } catch {
      msg.className = 'msg error'; msg.textContent = 'Cannot connect to server';
    }
  }
</script>
</body>
</html>
